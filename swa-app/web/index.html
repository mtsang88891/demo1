<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terraform Avengers</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="layout">
    <section class="panel">
      <h1>Terraform Avengers</h1>
      <p class="subtitle">AI-powered Terraform assistant. Powered by Azure OpenAI.</p>

      <label for="rules">Runtime Prompt Rules (optional)</label>
      <textarea id="rules" rows="4" placeholder="Add temporary rules for this conversation."></textarea>

      <label for="prompt">Your Message</label>
      <textarea id="prompt" rows="5" placeholder="Ask a question..."></textarea>

      <button id="send">Send</button>
      <p id="status" class="status"></p>
    </section>

    <section class="panel">
      <h2>Assistant Response</h2>
      <pre id="response" class="response">No response yet.</pre>
    </section>

    <section class="panel">
      <h2>Infrastructure Deployment</h2>
      <p class="subtitle">Deploy the suggested infrastructure to Azure.</p>

      <label for="deployment-name">Deployment Name</label>
      <input id="deployment-name" type="text" placeholder="e.g., my-app-deployment" />

      <label for="deployment-description">Description</label>
      <textarea id="deployment-description" rows="3" placeholder="Describe what you want to deploy..."></textarea>

      <button id="deploy">Deploy Infrastructure</button>
      <p id="deploy-status" class="status"></p>
      <pre id="deploy-response" class="response">No deployment yet.</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
